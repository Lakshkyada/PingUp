worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream auth_service { server auth-service:3002; }
    upstream user_service { server user-service:3001; }
    upstream post_service { server post-service:3003; }
    upstream message_service { server message-service:3005; }
    upstream feed_service { server feed-service:3006; }
    upstream search_service { server search-service:3004; }

    server {
        listen 80;
        server_name _;

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /health {
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        location = /api/user/register { proxy_pass http://auth_service/api/auth/register; }
        location = /api/user/login { proxy_pass http://auth_service/api/auth/login; }
        location = /api/user/logout { proxy_pass http://auth_service/api/auth/logout; }

        location = /api/user/data { proxy_pass http://user_service/api/users/me; }
        location = /api/user/update { proxy_pass http://user_service/api/users/update; }
        location = /api/user/discover { proxy_pass http://user_service/api/users/discover; }
        location = /api/user/follow { proxy_pass http://user_service/api/users/follow; }
        location = /api/user/unfollow { proxy_pass http://user_service/api/users/unfollow; }
        location = /api/user/connect { proxy_pass http://user_service/api/users/connect; }
        location = /api/user/connections { proxy_pass http://user_service/api/users/connections; }
        location = /api/user/accept { proxy_pass http://user_service/api/users/accept-connection; }
        location = /api/user/profiles { proxy_pass http://user_service/api/users/profile; }
        location = /api/user/recent-messages { proxy_pass http://message_service/api/messages/recent; }

        location = /api/post/add { proxy_pass http://post_service/api/posts; }
        location = /api/post/like { proxy_pass http://post_service/api/posts/like; }
        location = /api/post/feed { proxy_pass http://feed_service/api/feed/posts; }
        location = /api/story/create { proxy_pass http://post_service/api/stories; }
        location = /api/story/get { proxy_pass http://post_service/api/stories; }

        location = /api/message/send { proxy_pass http://message_service/api/messages; }
        location = /api/message/get { proxy_pass http://message_service/api/messages/get; }

        location ~ ^/api/message/([^/]+)$ {
            proxy_pass http://message_service/api/messages/sse/$1;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
        }

        location = /api/upload/imagekit-auth { proxy_pass http://user_service/api/users/imagekit-auth; }

        location /api/auth/ { proxy_pass http://auth_service; }
        location /api/users/ { proxy_pass http://user_service; }
        location /api/posts/ { proxy_pass http://post_service; }
        location /api/stories/ { proxy_pass http://post_service; }
        location /api/messages/ {
            proxy_pass http://message_service;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
        }
        location /api/feed/ { proxy_pass http://feed_service; }
        location /api/search/ { proxy_pass http://search_service; }

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}